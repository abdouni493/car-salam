<!doctype html>
<html lang="en" data-surface="admin">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Le thème du back-office AVANT le premier pixel : appliqué par React, la
      // page clignoterait en blanc à chaque rechargement avant de virer au noir.
      // Carbone par défaut : on ne retombe en clair que si l'utilisateur l'a
      // explicitement choisi via le bouton de la navbar.
      try {
        document.documentElement.dataset.adminTheme =
          localStorage.getItem('salam:admin-theme') === 'light' ? 'light' : 'carbon';
      } catch (e) {
        document.documentElement.dataset.adminTheme = 'carbon';
      }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MHD-AUTO | Location de Voitures</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
